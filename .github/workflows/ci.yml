name: CI

# PR-only validation pipeline for this Gradle/Android build. Release automation is
# intentionally out of scope here (no release workflow): this runs on pull requests only.
on:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs when a PR is updated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Unit tests
        run: ./gradlew :featbit-client:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble library AAR + example app
        run: ./gradlew :featbit-client:assembleRelease :example-app:assembleDebug --no-daemon --stacktrace

      - name: Upload library AAR
        uses: actions/upload-artifact@v4
        with:
          name: featbit-client-aar
          path: featbit-client/build/outputs/aar/*.aar
          retention-days: 7

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: featbit-client/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    name: E2E (real FeatBit via Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # Full-stack E2E: a real FBClient driven against a real FeatBit stack (Postgres +
      # api-server + evaluation-server) started by Testcontainers. ubuntu-latest provides Docker.
      - name: Full-stack E2E
        env:
          FEATBIT_E2E: "1"
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./gradlew :featbit-client:testDebugUnitTest --tests "co.featbit.client.e2e.*" --no-daemon --stacktrace

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: featbit-client/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore
